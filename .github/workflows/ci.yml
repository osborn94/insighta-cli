name: CLI CI

on:
  push:
    branches: [ main ]

jobs:
  cli:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18

      - run: npm install

      - name: Run CLI help
        run: node src/index.js --help